services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: chaos
      POSTGRES_PASSWORD: chaos
      POSTGRES_DB: chaos_substrate
    ports:
      - "54329:5432"
    volumes:
      - chaos_substrate_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chaos -d chaos_substrate"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  chaos_substrate_pg:
